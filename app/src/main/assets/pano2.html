<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A simple example</title>
    <link rel="stylesheet" href="file:///android_asset/lib/Pannellum2_5_6/pannellum.css"/>
    <script type="text/javascript" src="file:///android_asset/lib/Pannellum2_5_6/pannellum.js"></script>
    <script type="text/javascript" src="file:///android_asset/lib/Pannellum2_5_6/libpannellum.js"></script>
    <!--
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    -->
</head>
<body>

<div id="panorama"></div>
<script>
    const queryString = document.location.search;
    const params = new URLSearchParams(queryString);
    let canvas = document.getElementById('panorama');
    canvas.style.width = (window.innerWidth) + 'px';
    canvas.style.height = (window.innerHeight) + 'px';
    pannellum.viewer('panorama', {
        'autoLoad': true,
        'type': 'equirectangular',
        'panorama': params.get('img')
    });
</script>

</body>
</html>
