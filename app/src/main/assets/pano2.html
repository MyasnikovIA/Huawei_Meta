<div id="panorama"></div>
<script>
        let sceneMain={};

        // json_info = {    "default": {        "firstScene": "scene1"    },    "hotSpotDebug": false,    "hotPointDebug": true,    "sceneFadeDuration": 1000,    "scenes": {        "scene1": {            "hotSpots": [],            "panorama": "\/storage\/emulated\/0\/DCIM\/CV60\/PIC_20250308_152831.jpg",            "autoLoad": true,            "crossOrigin": "use-credentials",            "lon": 0,            "lat": 0,            "orient_azimuth": 0,            "orient_roll": 0,            "orient_pitch": 0,            "title": "title:PIC_20250308_152831",            "pitch": -3.5001450183561142,            "yaw": 172.69391364740358        }    }}

        imgInfoPath = params.get('img');

        console.log('imgInfoPath = '+imgInfoPath);
